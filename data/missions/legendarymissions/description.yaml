#Every mission should have this file included.  It describes the mission for the mission list screen of the server.
format version: 1

Category: Classic  # category for the mission; used for sorting and filtering the mission list
Category Priority: B  # letter grade for the category; A grade categories appear at the top of the list
Visible Mission Name: Legendary Missions  # name of the mission as it appears in the mission list
Description: Missions similar to the original Artemis Solo Missions list.
Keywords: classic, multiple
